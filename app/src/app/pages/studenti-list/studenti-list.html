<div class="table-container">
    <h1>Lista Studenti</h1>
    <a routerLink="/studenti/nuovo" class="btn-add">AGGIUNGI STUDENTE</a>

    <button type="button" (click)="toggleRicerca()" style="color: #8b5cf6">
        {{ mostraBarraRicerca ? 'CHIUDI RICERCA' : 'CERCA CORSO' }}
      </button>

      
@if (mostraBarraRicerca) {
    <div class="search-sidebar">
      <h3>Filtra Studenti</h3>
      
      <form (ngSubmit)="eseguiRicerca()">
        <div class="sidebar-field">
          <label>ID Studente</label>
          <input type="text" [(ngModel)]="filtri.id" name="id" (input)="eseguiRicerca()">
        </div>

        <div class="sidebar-field">
          <label>Matricola Studente</label>
          <input type="text" [(ngModel)]="filtri.matricola" name="matricola" (input)="eseguiRicerca()">
        </div>

        <div class="sidebar-actions">
          <button type="submit" class="btn-filter">Filtra</button>
          <button type="button" class="btn-reset" (click)="resetFiltri()">Reset</button>
        </div>
      </form>
    </div>
  }

    <table  class="custom-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Matricola</th>
            <th>Nome</th>
            <th>Cognome</th>
            <th></th>
         </tr>
    </thead>
    <tbody>
        @for (studente of listaStudenti; track studente.id) {
            <tr>
                <td class="id-column">{{studente.id}}</td>
                <td class="code-badge"><span>{{studente.matricola}}</span></td>
               <td class="main-text">
                <a [routerLink]="['/studenti', studente.id]" style="text-decoration: none; color: inherit; font-weight: bold;">{{studente.nome}} </a>
            </td>
                <td class="main-text">{{studente.cognome}}</td>
             <td>
          <button type="button" (click)="eliminaStudente(studente.id)" class="btn-delete"> Elimina </button>
          </td>
          </tr>
        } @empty {
            <tr>
            <td colspan="4" class="empty-row">NESSUNO STUDENTE TROVATO.</td>
            </tr>
        }
    </tbody>
    </table>
</div>
