<div class="table-container">
    <h1>Elenco Dipartimenti Universitari</h1>
    <table class="custom-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Codice</th>
            <th>Nome Dipartimento</th>
        </tr>
    </thead>
    <tbody>
        @for (dipartimento of listaDipartimenti; track dipartimento.id) {
            <tr>
                <td class="id-column">{{dipartimento.id}}</td>
                <td class="code-badge"><span>{{dipartimento.codice}}</span></td>
                <td  class="main-text">{{dipartimento.nome}}</td>
            </tr>
        } @empty {
            <tr>
            <td colspan="4" class="empty-row">NESSUN DIPARTIMENTO TROVATO.</td>
            </tr>
        }
    </tbody>
    </table>
</div>
