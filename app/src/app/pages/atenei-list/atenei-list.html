<div class="table-container">
    <h2> Elenco Atenei Universitari</h2>

    <a routerLink="/atenei/nuovo" class="btn-add">AGGIUNGI ATENEO</a>

    <table class="custom-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Codice</th>
            <th>Nome Ateneo</th>
            <th>Città</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (ateneo of listaAtenei; track ateneo.ateneoId) {
            <tr>
                <td class="id-column">{{ateneo.ateneoId}}</td>
                <td class="code-badge"><span>{{ateneo.codice}}</span></td>
                <a [routerLink]="['/atenei',ateneo.ateneoId]"><td class="main-text">{{ateneo.nome}}</td></a>
                <td class="main-text">{{ateneo.citta}}</td>
                <td>
          <button type="button" (click)="eliminaAteneo(ateneo.ateneoId)" class="btn-delete"> Elimina </button>
          </td>
          </tr>
        } 
        @empty {
            <tr>
                <td colspan="4" class="empty-row">Nessun ateneo trovato nel database.</td>
            </tr>
        }
    </tbody>
    </table>
</div>
